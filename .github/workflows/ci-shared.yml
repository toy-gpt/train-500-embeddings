# ============================================================
# .github/workflows/ci-shared.yml (CI with shared config)
# ============================================================
# WHY: Calls org-level CI; maintained centrally in toy-gpt/.github.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: toy-gpt/.github/.github/workflows/ci-org.yml@main
